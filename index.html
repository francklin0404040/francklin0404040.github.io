<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Cocina — Menú</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --warm: #B85C2A;
    --warm-dark: #9A4A20;
    --warm-light: #FDF0E6;
    --dark-bg: #1C0F05;
    --surface: #FDFAF5;
    --surface2: #F7F1E8;
    --text: #1A1208;
    --text2: #6B5D4F;
    --border: rgba(0,0,0,0.12);
    --green-bg: #EAF3DE;
    --red: #E24B4A;
    --error: #E24B4A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark-bg);
    color: var(--text);
    height: 100%;
  }

  /* ── FULL SCREEN LAYOUT ── */
  .app {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
  }

  /* ── TOP HEADER ── */
  .header {
    background: var(--dark-bg);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-icon {
    width: 36px; height: 36px; background: var(--warm); border-radius: 9px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .header-title { font-family: 'Playfair Display', serif; font-size: 20px; }
  .header-sub { font-size: 11px; color: rgba(255,255,255,0.45); }

  /* ── CART FAB BUTTON ── */
  .cart-fab {
    display: flex; align-items: center; gap: 10px;
    background: var(--warm); color: #fff;
    border: none; border-radius: 30px;
    padding: 9px 18px 9px 14px;
    font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
    position: relative;
  }
  .cart-fab:hover { background: var(--warm-dark); }
  .cart-fab-icon { font-size: 16px; }
  .cart-fab-count {
    background: #fff; color: var(--warm);
    border-radius: 20px; padding: 1px 8px;
    font-size: 12px; font-weight: 500;
  }
  .cart-fab-total { font-size: 13px; }

  /* ── MENU SCROLL AREA ── */
  .menu-scroll {
    flex: 1; overflow-y: auto; position: relative;
  }
  .menu-scroll::-webkit-scrollbar { width: 4px; }
  .menu-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

  .cat-header {
    padding: 10px 24px 6px;
    font-size: 10px; font-weight: 500; letter-spacing: 1.2px;
    color: var(--warm); text-transform: uppercase;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 2;
  }
  .menu-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 24px; border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .menu-item:hover { background: var(--warm-light); }
  .item-info { flex: 1; min-width: 0; margin-right: 16px; }
  .item-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .item-desc { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .item-price { font-size: 13px; color: var(--warm); font-weight: 500; }

  .qty-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .qty-btn {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; border: none;
    transition: all 0.15s; font-family: inherit; line-height: 1;
  }
  .qty-minus { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .qty-minus:hover { background: #e0d8cc; }
  .qty-plus { background: var(--warm); color: #fff; }
  .qty-plus:hover { background: var(--warm-dark); }
  .qty-num { font-size: 15px; font-weight: 500; min-width: 20px; text-align: center; }

  /* ── OVERLAY ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  /* ── CART DRAWER (slides up from bottom) ── */
  .cart-drawer {
    background: #fff;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 560px;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .drawer-handle {
    width: 40px; height: 4px; background: rgba(0,0,0,0.15);
    border-radius: 2px; margin: 12px auto 0;
  }
  .drawer-header {
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .drawer-title { font-family: 'Playfair Display', serif; font-size: 18px; }
  .drawer-close {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--surface2); border: none; cursor: pointer;
    font-size: 18px; color: var(--text2); display: flex; align-items: center; justify-content: center;
  }
  .drawer-close:hover { background: #e0d8cc; }

  /* ── DRAWER STEPS ── */
  .drawer-steps {
    display: flex; padding: 0 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .step-tab {
    flex: 1; padding: 10px 0; font-size: 12px; font-weight: 500;
    text-align: center; color: var(--text2);
    border-bottom: 2px solid transparent;
    cursor: pointer; transition: all 0.15s;
  }
  .step-tab.active { color: var(--warm); border-bottom-color: var(--warm); }
  .step-tab.done { color: #2E7D4F; }

  .drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .drawer-body::-webkit-scrollbar { width: 4px; }
  .drawer-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

  /* ── CART ITEMS ── */
  .cart-empty { padding: 30px; text-align: center; color: var(--text2); }
  .cart-empty-icon { font-size: 32px; margin-bottom: 10px; }
  .cart-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .cart-row-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .cart-qty {
    background: var(--warm-light); color: #7A3B10;
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; flex-shrink: 0;
  }
  .cart-name { font-size: 13px; }
  .cart-row-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .cart-price { font-size: 13px; color: var(--text2); }
  .cart-remove {
    background: none; border: none; cursor: pointer;
    font-size: 16px; color: var(--text2); line-height: 1; padding: 2px;
  }
  .cart-remove:hover { color: var(--red); }
  .cart-subtotal {
    display: flex; justify-content: space-between;
    padding: 12px 0 0; font-size: 14px; font-weight: 500;
  }

  /* ── FORM ── */
  .field { margin-bottom: 14px; }
  .field label {
    font-size: 12px; font-weight: 500; color: var(--text2);
    display: block; margin-bottom: 5px;
  }
  .field label .req { color: var(--red); margin-left: 2px; }
  .field input {
    width: 100%; padding: 9px 13px; border: 1.5px solid var(--border);
    border-radius: 9px; font-family: inherit; font-size: 13px; color: var(--text);
    background: var(--surface); outline: none; transition: border 0.15s;
  }
  .field input:focus { border-color: var(--warm); }
  .field input.error { border-color: var(--red); }
  .field-error { font-size: 11px; color: var(--red); margin-top: 4px; display: none; }
  .field-error.show { display: block; }

  .chips { display: flex; gap: 7px; flex-wrap: wrap; }
  .chip {
    padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    cursor: pointer; border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text2); transition: all 0.15s; user-select: none;
  }
  .chip.on { background: var(--warm); color: #fff; border-color: var(--warm); }
  .chip.error-chip { border-color: var(--red); }

  .chips-label {
    font-size: 11px; color: var(--red); margin-top: 5px; display: none;
  }
  .chips-label.show { display: block; }

  .address-field { margin-top: 10px; display: none; }
  .address-field.show { display: block; }

  /* ── SECTION TITLE ── */
  .form-section { margin-bottom: 18px; }
  .form-section-title {
    font-size: 10px; font-weight: 500; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text2); margin-bottom: 10px;
  }

  /* ── DRAWER FOOTER ── */
  .drawer-footer {
    padding: 14px 20px; border-top: 1px solid var(--border);
    flex-shrink: 0; background: #fff; border-radius: 0 0 0 0;
  }
  .total-row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
  }
  .total-label { font-size: 13px; color: var(--text2); }
  .total-amount { font-size: 20px; font-weight: 500; }

  .wa-btn {
    width: 100%; padding: 13px; background: #25D366; color: #fff;
    border: none; border-radius: 10px; font-family: inherit; font-size: 14px;
    font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background 0.2s;
  }
  .wa-btn:hover:not(:disabled) { background: #1ebe5d; }
  .wa-btn:disabled { background: #b5b5b5; cursor: not-allowed; }
  .wa-btn svg { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

  .next-btn {
    width: 100%; padding: 13px; background: var(--warm); color: #fff;
    border: none; border-radius: 10px; font-family: inherit; font-size: 14px;
    font-weight: 500; cursor: pointer; transition: background 0.2s;
  }
  .next-btn:hover { background: var(--warm-dark); }

  /* ── CONFIRM ── */
  .confirm-wrap {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1;
    padding: 60px 24px; text-align: center;
  }
  .confirm-icon {
    width: 68px; height: 68px; background: var(--green-bg); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; margin-bottom: 18px;
  }
  .confirm-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 8px; }
  .confirm-sub { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 28px; }
  .reset-btn {
    padding: 11px 28px; background: var(--warm); color: #fff; border: none;
    border-radius: 9px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .reset-btn:hover { background: var(--warm-dark); }

  /* ── MESA GRID ── */
  .mesa-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 7px;
  }
  .mesa-chip {
    padding: 7px 0; text-align: center; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text2); transition: all 0.15s;
  }
  .mesa-chip.on { background: var(--warm); color: #fff; border-color: var(--warm); }
  .mesa-chip.error-chip { border-color: var(--red); }
</style>
</head>
<body>
<div class="app" id="app"></div>

<!-- OVERLAY / CART DRAWER -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="cart-drawer" id="cartDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <span class="drawer-title" id="drawerTitle">Tu pedido</span>
      <button class="drawer-close" onclick="closeCart()">×</button>
    </div>
    <div class="drawer-steps" id="drawerSteps">
      <div class="step-tab active" id="step0" onclick="goStep(0)">🛒 Carrito</div>
      <div class="step-tab" id="step1" onclick="goStep(1)">📋 Datos</div>
      <div class="step-tab" id="step2" onclick="goStep(2)">✅ Confirmar</div>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-footer" id="drawerFooter"></div>
  </div>
</div>

<script>
const CONFIG = {
  restaurantName: "La Cocina",
  whatsappNumber: "50760000000", // ← Cambia tu número (código de país + número, sin + ni espacios)
  currency: "$",
  mesas: 12 // cantidad de mesas
};

const MENU = [
  { cat: "Entradas", items: [
    { id: 1, name: "Ceviche de camarón", desc: "Camarones frescos, limón, cilantro", price: 8.50 },
    { id: 2, name: "Patacones con guacamole", desc: "Plátano frito, aguacate fresco", price: 6.00 },
    { id: 3, name: "Sopa del día", desc: "Pregunta a tu mesero", price: 5.50 },
  ]},
  { cat: "Platos fuertes", items: [
    { id: 4, name: "Arroz con pollo", desc: "Pollo guisado, arroz amarillo, ensalada", price: 12.00 },
    { id: 5, name: "Filete de corvina", desc: "A la plancha, papas y vegetales", price: 16.50 },
    { id: 6, name: "Ropa vieja", desc: "Carne desmechada, arroz, frijoles", price: 13.00 },
    { id: 7, name: "Pasta al pesto", desc: "Vegetariano, albahaca, parmesano", price: 11.00 },
  ]},
  { cat: "Bebidas", items: [
    { id: 8, name: "Chicha de maíz", desc: "Bebida tradicional panameña", price: 3.00 },
    { id: 9, name: "Jugo natural", desc: "Maracuyá, mango o piña", price: 3.50 },
    { id: 10, name: "Agua mineral", desc: "Con o sin gas", price: 2.00 },
    { id: 11, name: "Café panameño", desc: "Café de altura, Boquete", price: 3.50 },
  ]},
  { cat: "Postres", items: [
    { id: 12, name: "Tres leches", desc: "Esponjoso, crema chantilly", price: 5.00 },
    { id: 13, name: "Flan de coco", desc: "Tradicional, con caramelo", price: 4.50 },
  ]}
];

let state = {
  cart: {},
  cartOpen: false,
  step: 0, // 0=carrito, 1=datos, 2=confirmar
  sent: false,
  // form
  name: '',
  mesa: '',
  delivery: '',
  address: '',
  payment: '',
  // validation errors
  errors: {}
};

// ── HELPERS ───────────────────────────────────────────────
function findItem(id) {
  for (const c of MENU) for (const i of c.items) if (i.id === id) return i;
  return null;
}
function cartItems() {
  return Object.entries(state.cart)
    .filter(([,q]) => q > 0)
    .map(([id, qty]) => ({ item: findItem(parseInt(id)), qty }))
    .filter(x => x.item);
}
function total() { return cartItems().reduce((s, {item, qty}) => s + item.price * qty, 0); }
function count() { return Object.values(state.cart).reduce((a,b) => a+b, 0); }
function genId() { return Math.random().toString(36).substring(2,7).toUpperCase(); }

// ── VALIDATION ────────────────────────────────────────────
function validate() {
  const e = {};
  if (state.name.trim().length < 2) e.name = 'Por favor ingresa tu nombre completo';
  if (!state.mesa) e.mesa = 'Selecciona tu mesa';
  if (!state.delivery) e.delivery = 'Selecciona el tipo de entrega';
  if (state.delivery === 'domicilio' && state.address.trim().length < 4) e.address = 'Ingresa tu dirección de entrega';
  if (!state.payment) e.payment = 'Selecciona el método de pago';
  state.errors = e;
  return Object.keys(e).length === 0;
}

// ── WHATSAPP ──────────────────────────────────────────────
function buildMsg() {
  const id = genId();
  const deliveryMap = { salon: 'En el salón', recoger: 'Para recoger', domicilio: 'Domicilio' };
  const pagoMap = { efectivo: 'Efectivo', tarjeta: 'Tarjeta' };
  let m = `🚀 *PEDIDO #${id}* 🚀\n`;
  m += `━━━━━━━━━━━━━━━━━━\n`;
  m += `👤 *Cliente:* ${state.name}\n`;
  m += `🪑 *Mesa:* ${state.mesa}\n`;
  m += `📦 *Entrega:* ${deliveryMap[state.delivery]}\n`;
  if (state.delivery === 'domicilio' && state.address) m += `📍 *Dirección:* ${state.address}\n`;
  m += `💳 *Pago:* ${pagoMap[state.payment]}\n`;
  m += `━━━━━━━━━━━━━━━━━━\n`;
  m += `🛒 *DETALLE DEL PEDIDO:*\n\n`;
  cartItems().forEach(({item, qty}) => {
    m += `▪ ${qty}x ${item.name} ($${(item.price * qty).toFixed(2)})\n`;
  });
  m += `━━━━━━━━━━━━━━━━━━\n`;
  m += `💰 *TOTAL A PAGAR: $${total().toFixed(2)}*`;
  return m;
}

function sendWA() {
  const url = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(buildMsg())}`;
  window.open(url, '_blank');
  state.sent = true;
  closeCart();
  renderApp();
}

// ── ACTIONS ───────────────────────────────────────────────
function updateCart(id, d) {
  state.cart[id] = Math.max(0, (state.cart[id] || 0) + d);
  renderApp();
  if (state.cartOpen) renderDrawer();
}
function removeItem(id) {
  delete state.cart[id];
  renderApp();
  if (state.cartOpen) renderDrawer();
}
function openCart() {
  state.cartOpen = true;
  state.step = 0;
  document.getElementById('overlay').classList.add('open');
  renderDrawer();
}
function closeCart() {
  state.cartOpen = false;
  document.getElementById('overlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeCart();
}
function goStep(s) {
  if (s === 1 && count() === 0) return;
  if (s === 2) {
    if (!validate()) { state.step = 1; renderDrawer(); return; }
  }
  state.step = s;
  renderDrawer();
}
function nextStep() {
  if (state.step === 0) { if (count() > 0) { state.step = 1; renderDrawer(); } }
  else if (state.step === 1) {
    if (validate()) { state.step = 2; renderDrawer(); }
    else { renderDrawer(); }
  } else if (state.step === 2) {
    sendWA();
  }
}

// ── RENDER APP ────────────────────────────────────────────
function renderApp() {
  const c = count();
  document.getElementById('app').innerHTML = state.sent ? sentHTML() : `
    <div class="header">
      <div class="header-brand">
        <div class="header-icon">🍽</div>
        <div>
          <div class="header-title">${CONFIG.restaurantName}</div>
          <div class="header-sub">Selecciona tus platillos</div>
        </div>
      </div>
      ${c > 0 ? `
        <button class="cart-fab" onclick="openCart()">
          <span class="cart-fab-icon">🛒</span>
          <span class="cart-fab-count">${c}</span>
          <span class="cart-fab-total">$${total().toFixed(2)}</span>
        </button>
      ` : ''}
    </div>
    <div class="menu-scroll">
      ${MENU.map(cat => `
        <div class="cat-header">${cat.cat}</div>
        ${cat.items.map(item => {
          const qty = state.cart[item.id] || 0;
          return `<div class="menu-item">
            <div class="item-info">
              <div class="item-name">${item.name}</div>
              <div class="item-desc">${item.desc}</div>
              <div class="item-price">${CONFIG.currency}${item.price.toFixed(2)}</div>
            </div>
            <div class="qty-ctrl">
              ${qty > 0 ? `<button class="qty-btn qty-minus" onclick="updateCart(${item.id},-1)">−</button><span class="qty-num">${qty}</span>` : ''}
              <button class="qty-btn qty-plus" onclick="updateCart(${item.id},1)">+</button>
            </div>
          </div>`;
        }).join('')}
      `).join('')}
      <div style="height:30px"></div>
    </div>
  `;
}

// ── RENDER DRAWER ─────────────────────────────────────────
function renderDrawer() {
  const steps = ['🛒 Carrito', '📋 Datos', '✅ Confirmar'];
  // step tabs
  document.getElementById('drawerTitle').textContent =
    state.step === 0 ? 'Tu pedido' : state.step === 1 ? 'Tus datos' : 'Confirmar pedido';

  const stepsEl = document.getElementById('drawerSteps');
  stepsEl.innerHTML = steps.map((s, i) => `
    <div class="step-tab ${i === state.step ? 'active' : i < state.step ? 'done' : ''}"
         onclick="goStep(${i})">${s}</div>
  `).join('');

  // body
  const body = document.getElementById('drawerBody');
  const footer = document.getElementById('drawerFooter');

  if (state.step === 0) {
    body.innerHTML = renderStepCart();
    footer.innerHTML = `
      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-amount">$${total().toFixed(2)}</span>
      </div>
      <button class="next-btn" onclick="nextStep()" ${count()===0?'disabled style="background:#b5b5b5;cursor:not-allowed"':''}>
        Continuar con los datos →
      </button>
    `;
  } else if (state.step === 1) {
    body.innerHTML = renderStepForm();
    footer.innerHTML = `
      <button class="next-btn" onclick="nextStep()">Revisar pedido →</button>
    `;
    // attach input listeners after render
    setTimeout(() => {
      const ni = document.getElementById('inp-name');
      if (ni) {
        ni.value = state.name;
        ni.addEventListener('input', e => { state.name = e.target.value; });
      }
      const ai = document.getElementById('inp-address');
      if (ai) {
        ai.value = state.address;
        ai.addEventListener('input', e => { state.address = e.target.value; });
      }
    }, 0);
  } else {
    body.innerHTML = renderStepConfirm();
    footer.innerHTML = `
      <div class="total-row">
        <span class="total-label">Total a pagar</span>
        <span class="total-amount">$${total().toFixed(2)}</span>
      </div>
      <button class="wa-btn" onclick="sendWA()">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Enviar pedido por WhatsApp
      </button>
    `;
  }
}

function renderStepCart() {
  const items = cartItems();
  if (items.length === 0) return `
    <div class="cart-empty">
      <div class="cart-empty-icon">🛒</div>
      <div style="font-size:14px;color:var(--text2)">Cierra esto y agrega platillos del menú</div>
    </div>
  `;
  return items.map(({item, qty}) => `
    <div class="cart-row">
      <div class="cart-row-left">
        <span class="cart-qty">${qty}</span>
        <span class="cart-name">${item.name}</span>
      </div>
      <div class="cart-row-right">
        <span class="cart-price">$${(item.price*qty).toFixed(2)}</span>
        <button class="cart-remove" onclick="removeItem(${item.id})">×</button>
      </div>
    </div>
  `).join('') + `
    <div class="cart-subtotal">
      <span style="color:var(--text2)">Subtotal</span>
      <span>$${total().toFixed(2)}</span>
    </div>
  `;
}

function renderStepForm() {
  const e = state.errors;
  const mesaNums = Array.from({length: CONFIG.mesas}, (_, i) => i + 1);
  return `
    <div class="form-section">
      <div class="form-section-title">Información personal</div>
      <div class="field">
        <label>Nombre completo <span class="req">*</span></label>
        <input id="inp-name" type="text" placeholder="Ej: María González"
               class="${e.name ? 'error' : ''}">
        <div class="field-error ${e.name ? 'show' : ''}">${e.name || ''}</div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Mesa <span style="color:var(--red)">*</span></div>
      <div class="mesa-grid">
        ${mesaNums.map(n => `
          <div class="mesa-chip ${state.mesa == n ? 'on' : ''} ${e.mesa && !state.mesa ? 'error-chip' : ''}"
               onclick="selectMesa(${n})">
            ${n}
          </div>
        `).join('')}
      </div>
      <div class="chips-label ${e.mesa ? 'show' : ''}">${e.mesa || ''}</div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Tipo de entrega <span style="color:var(--red)">*</span></div>
      <div class="chips">
        <div class="chip ${state.delivery==='salon'?'on':''} ${e.delivery&&!state.delivery?'error-chip':''}"
             onclick="selectDelivery('salon')">🪑 En el salón</div>
        <div class="chip ${state.delivery==='recoger'?'on':''} ${e.delivery&&!state.delivery?'error-chip':''}"
             onclick="selectDelivery('recoger')">🏃 Para recoger</div>
        <div class="chip ${state.delivery==='domicilio'?'on':''} ${e.delivery&&!state.delivery?'error-chip':''}"
             onclick="selectDelivery('domicilio')">🛵 Domicilio</div>
      </div>
      <div class="chips-label ${e.delivery ? 'show' : ''}">${e.delivery || ''}</div>
      <div class="address-field ${state.delivery==='domicilio'?'show':''}">
        <div class="field" style="margin-bottom:0;margin-top:10px">
          <label>Dirección de entrega <span class="req">*</span></label>
          <input id="inp-address" type="text" placeholder="Ej: Calle 5, Casa 12, Colón"
                 class="${e.address ? 'error' : ''}">
          <div class="field-error ${e.address ? 'show' : ''}">${e.address || ''}</div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Método de pago <span style="color:var(--red)">*</span></div>
      <div class="chips">
        <div class="chip ${state.payment==='efectivo'?'on':''} ${e.payment&&!state.payment?'error-chip':''}"
             onclick="selectPayment('efectivo')">💵 Efectivo</div>
        <div class="chip ${state.payment==='tarjeta'?'on':''} ${e.payment&&!state.payment?'error-chip':''}"
             onclick="selectPayment('tarjeta')">💳 Tarjeta</div>
      </div>
      <div class="chips-label ${e.payment ? 'show' : ''}">${e.payment || ''}</div>
    </div>
  `;
}

function renderStepConfirm() {
  const deliveryMap = { salon: '🪑 En el salón', recoger: '🏃 Para recoger', domicilio: '🛵 Domicilio' };
  const pagoMap = { efectivo: '💵 Efectivo', tarjeta: '💳 Tarjeta' };
  return `
    <div style="margin-bottom:16px">
      <div class="form-section-title" style="margin-bottom:10px">Resumen del pedido</div>
      ${cartItems().map(({item, qty}) => `
        <div class="cart-row">
          <div class="cart-row-left">
            <span class="cart-qty">${qty}</span>
            <span class="cart-name">${item.name}</span>
          </div>
          <div class="cart-row-right">
            <span class="cart-price">$${(item.price*qty).toFixed(2)}</span>
          </div>
        </div>
      `).join('')}
    </div>
    <div style="background:var(--surface2);border-radius:10px;padding:14px;font-size:13px;line-height:2">
      <div><strong>👤 Cliente:</strong> ${state.name}</div>
      <div><strong>🪑 Mesa:</strong> ${state.mesa}</div>
      <div><strong>📦 Entrega:</strong> ${deliveryMap[state.delivery]}</div>
      ${state.delivery === 'domicilio' ? `<div><strong>📍 Dirección:</strong> ${state.address}</div>` : ''}
      <div><strong>💳 Pago:</strong> ${pagoMap[state.payment]}</div>
    </div>
    <div style="font-size:12px;color:var(--text2);text-align:center;margin-top:14px">
      Al presionar el botón se abrirá WhatsApp con tu pedido
    </div>
  `;
}

function sentHTML() {
  return `
    <div class="header">
      <div class="header-brand">
        <div class="header-icon">🍽</div>
        <div><div class="header-title">${CONFIG.restaurantName}</div></div>
      </div>
    </div>
    <div class="confirm-wrap">
      <div class="confirm-icon">✓</div>
      <div class="confirm-title">¡Pedido enviado!</div>
      <div class="confirm-sub">
        Tu pedido fue enviado por WhatsApp, <strong>${state.name}</strong>.<br>
        Pronto te confirmamos.
      </div>
      <button class="reset-btn" onclick="resetAll()">Hacer otro pedido</button>
    </div>
  `;
}

function selectMesa(n) { state.mesa = n; if(state.cartOpen) renderDrawer(); }
function selectDelivery(v) { state.delivery = v; if(state.cartOpen) renderDrawer(); }
function selectPayment(v) { state.payment = v; if(state.cartOpen) renderDrawer(); }

function resetAll() {
  state = { cart: {}, cartOpen: false, step: 0, sent: false, name: '', mesa: '', delivery: '', address: '', payment: '', errors: {} };
  renderApp();
}

renderApp();
</script>
</body>
</html>
